<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEONPRO - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: linear-gradient(135deg, #0a0a0b 0%, #1a1a1b 100%);
        color: #f9fafb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }

      /* Animated background orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.3;
        animation: float 20s infinite ease-in-out;
      }

      .orb1 {
        width: 400px;
        height: 400px;
        background: #ac9469;
        top: -200px;
        left: -200px;
      }

      .orb2 {
        width: 300px;
        height: 300px;
        background: #112031;
        bottom: -150px;
        right: -150px;
        animation-delay: -10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(50px, -50px) scale(1.1);
        }
        50% {
          transform: translate(-50px, 50px) scale(0.9);
        }
        75% {
          transform: translate(50px, 50px) scale(1.05);
        }
      }

      .container {
        position: relative;
        z-index: 10;
        max-width: 500px;
        width: 100%;
        text-align: center;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 48px 32px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: linear-gradient(135deg, #ac9469 0%, #8a7854 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(172, 148, 105, 0.3);
      }

      .icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #f9fafb 0%, #ac9469 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 18px;
        color: rgba(249, 250, 251, 0.7);
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .button {
        display: inline-block;
        padding: 14px 32px;
        background: linear-gradient(135deg, #ac9469 0%, #8a7854 100%);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(172, 148, 105, 0.3);
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 30px rgba(172, 148, 105, 0.4);
      }

      .status {
        margin-top: 24px;
        font-size: 14px;
        color: rgba(249, 250, 251, 0.5);
      }

      @media (max-width: 640px) {
        .glass-card {
          padding: 32px 24px;
        }

        h1 {
          font-size: 28px;
        }

        p {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="container">
      <div class="glass-card">
        <div class="icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"
            />
          </svg>
        </div>

        <h1>You're Offline</h1>
        <p>
          It looks like you've lost your internet connection. Don't worry,
          NEONPRO works offline too! Some features may be limited.
        </p>

        <a
          href="/"
          class="button"
          onclick="window.location.reload(); return false;"
        >
          Try Again
        </a>

        <div class="status">
          <span id="status-text">Checking connection...</span>
        </div>
      </div>
    </div>

    <script>
      // Check online status
      function updateOnlineStatus() {
        const statusEl = document.getElementById("status-text");
        if (navigator.onLine) {
          statusEl.textContent = "Connection restored! Reloading...";
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        } else {
          statusEl.textContent = "No internet connection";
        }
      }

      window.addEventListener("online", updateOnlineStatus);
      window.addEventListener("offline", updateOnlineStatus);

      // Initial check
      updateOnlineStatus();
    </script>
  </body>
</html>
