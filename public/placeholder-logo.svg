<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal para o rosto -->
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente para os circuitos -->
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC8F;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra suave -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo escuro -->
  <rect width="512" height="512" fill="#0A1628"/>
  
  <!-- Perfil do rosto -->
  <path d="M 200 100 
           C 200 100, 280 90, 320 110
           C 360 130, 380 170, 380 210
           C 380 250, 375 260, 360 270
           C 345 280, 340 285, 335 295
           C 330 305, 325 310, 310 315
           C 295 320, 285 325, 280 340
           C 275 355, 270 365, 260 375
           C 250 385, 240 390, 220 395
           C 200 400, 180 400, 160 395
           C 140 390, 130 380, 125 360
           C 120 340, 125 320, 135 310
           C 145 300, 150 295, 145 285
           C 140 275, 135 270, 140 260
           C 145 250, 150 245, 155 235
           C 160 225, 165 215, 170 200
           C 175 185, 180 170, 185 150
           C 190 130, 195 110, 200 100 Z"
        fill="url(#faceGradient)"
        filter="url(#glow)"
        opacity="0.9"/>
  
  <!-- Circuito 1 - Superior -->
  <g stroke="url(#circuitGradient)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 360 200 L 420 180 L 460 180" />
    <circle cx="460" cy="180" r="12" fill="url(#circuitGradient)" stroke="none"/>
    <circle cx="460" cy="180" r="6" fill="#0A1628"/>
  </g>
  
  <!-- Circuito 2 - Meio -->
  <g stroke="url(#circuitGradient)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 340 280 L 400 280 L 440 260 L 480 260" />
    <circle cx="480" cy="260" r="12" fill="url(#circuitGradient)" stroke="none"/>
    <circle cx="480" cy="260" r="6" fill="#0A1628"/>
  </g>
  
  <!-- Circuito 3 - Inferior -->
  <g stroke="url(#circuitGradient)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 300 350 L 360 350 L 400 330 L 450 330" />
    <circle cx="450" cy="330" r="12" fill="url(#circuitGradient)" stroke="none"/>
    <circle cx="450" cy="330" r="6" fill="#0A1628"/>
  </g>
  
  <!-- Detalhes do rosto (nariz e boca) -->
  <path d="M 275 240 C 280 245, 285 250, 280 255"
        stroke="#0099CC"
        stroke-width="2"
        fill="none"
        opacity="0.6"/>
  
  <path d="M 260 300 C 270 305, 280 305, 285 300"
        stroke="#0099CC"
        stroke-width="2"
        fill="none"
        opacity="0.6"/>
</svg>