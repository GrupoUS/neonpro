name: NeonPro Healthcare API - CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/*", "hotfix/*"]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/neonpro-api

jobs:
  # Code Quality and Security Checks
  quality-check:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome linting and formatting
        run: pnpm biome check --apply-unsafe ./apps/neonpro-api/src

      - name: Run TypeScript type checking
        run: pnpm tsc --noEmit --project ./apps/neonpro-api/tsconfig.json

      - name: Run security audit
        run: pnpm audit --audit-level moderate

      - name: Run LGPD compliance check
        run: |
          echo "Checking LGPD compliance..."
          grep -r "password\|senha\|cpf\|cnpj" ./apps/neonpro-api/src --include="*.ts" || true
          echo "LGPD compliance check completed"

  # Unit and Integration Tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-check

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neonpro_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup test environment
        run: |
          cp .env.example .env.test
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/neonpro_test" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test

      - name: Run database migrations
        run: pnpm run db:migrate:test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neonpro_test

      - name: Run unit tests
        run: pnpm test:unit --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neonpro_test
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: pnpm test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neonpro_test
          REDIS_URL: redis://localhost:6379

      - name: Run healthcare compliance tests
        run: pnpm test:compliance
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          name: neonpro-api-coverage

  # Healthcare-specific Security Scanning
  security-scan:
    name: Healthcare Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Healthcare data protection scan
        run: |
          echo "Scanning for healthcare data protection compliance..."
          # Check for hardcoded sensitive data patterns
          if grep -r "cpf.*[0-9]" ./apps/neonpro-api/src --include="*.ts"; then
            echo "⚠️  Found potential hardcoded CPF in code"
            exit 1
          fi
          echo "✅ Healthcare data protection scan completed"

  # Build and Test Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, security-scan]
    if: github.event_name != 'pull_request'

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/neonpro-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Test Docker image
        run: |
          docker run --rm -d \
            --name neonpro-test \
            -p 3000:3000 \
            -e NODE_ENV=test \
            ${{ steps.meta.outputs.tags }}
          
          # Wait for container to start
          sleep 10
          
          # Health check
          curl -f http://localhost:3000/health || exit 1
          
          # Stop test container
          docker stop neonpro-test

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://api-staging.neonpro.health

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name neonpro-staging --region us-east-1

      - name: Deploy to staging
        run: |
          envsubst < k8s/staging/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/neonpro-api -n staging --timeout=300s
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}

      - name: Run staging health checks
        run: |
          kubectl wait --for=condition=ready pod -l app=neonpro-api -n staging --timeout=300s
          
          # Run health check
          STAGING_URL="https://api-staging.neonpro.health"
          curl -f ${STAGING_URL}/health || exit 1
          curl -f ${STAGING_URL}/health/db || exit 1
          curl -f ${STAGING_URL}/health/redis || exit 1

      - name: Run compliance validation
        run: |
          echo "Running LGPD and ANVISA compliance validation..."
          # Add specific healthcare compliance checks here
          echo "✅ Compliance validation completed"

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.neonpro.health

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name neonpro-production --region us-east-1

      - name: Create database backup before deployment
        run: |
          kubectl create job --from=cronjob/database-backup backup-pre-deploy-$(date +%s) -n production
          echo "✅ Pre-deployment backup initiated"

      - name: Deploy to production with blue-green strategy
        run: |
          # Blue-green deployment
          envsubst < k8s/production/deployment-green.yaml | kubectl apply -f -
          kubectl rollout status deployment/neonpro-api-green -n production --timeout=600s
          
          # Health check on green deployment
          kubectl port-forward svc/neonpro-api-green 8080:3000 -n production &
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          
          # Switch traffic to green
          kubectl patch service neonpro-api -n production -p '{"spec":{"selector":{"version":"green"}}}'
          
          # Wait and then cleanup blue
          sleep 60
          kubectl delete deployment neonpro-api-blue -n production --ignore-not-found=true
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}

      - name: Run production health checks
        run: |
          PROD_URL="https://api.neonpro.health"
          
          # Comprehensive health checks
          curl -f ${PROD_URL}/health || exit 1
          curl -f ${PROD_URL}/health/db || exit 1
          curl -f ${PROD_URL}/health/redis || exit 1
          curl -f ${PROD_URL}/health/jobs || exit 1
          curl -f ${PROD_URL}/metrics || exit 1

      - name: Update monitoring dashboards
        run: |
          echo "Updating Grafana dashboards for new deployment..."
          # Add dashboard update logic here
          echo "✅ Monitoring dashboards updated"

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🚀 NeonPro Healthcare API deployed successfully to production!
            
            📋 Deployment Details:
            • Version: ${{ github.sha }}
            • Image: ${{ needs.build.outputs.image-tag }}
            • Environment: Production
            • Health Status: ✅ All checks passed
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Rollback mechanism
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: failure() && github.ref == 'refs/heads/main'
    needs: [deploy-production]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name neonpro-production --region us-east-1

      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/neonpro-api -n production
          kubectl rollout status deployment/neonpro-api -n production --timeout=300s

      - name: Verify rollback
        run: |
          PROD_URL="https://api.neonpro.health"
          curl -f ${PROD_URL}/health || exit 1

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ⚠️ NeonPro Healthcare API deployment failed and was rolled back!
            
            🔄 Rollback completed successfully
            • Environment: Production
            • Previous version restored
            • Health checks: ✅ Passed
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}