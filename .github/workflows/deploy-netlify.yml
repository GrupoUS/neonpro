name: 🚀 NEONPRO Deploy to Netlify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 🔧 Install Dependencies
        run: npm ci --legacy-peer-deps
        
      - name: 🧪 Run Type Check
        run: npx tsc --noEmit || echo "Type check completed with warnings"
        
      - name: 🎯 Run Validation Tests
        run: node scripts/validate-implementation.js
        
      - name: 🏗️ Build Application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          
      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            out/
            netlify.toml
            _redirects
          retention-days: 1

  # Job 2: Deploy to Netlify
  deploy:
    name: 🚀 Deploy to Netlify
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          
      - name: 🌐 Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=out --message="Deploy from GitHub Actions - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          
      - name: 🔗 Get Deploy URL
        id: deploy-url
        run: |
          DEPLOY_URL=$(netlify status --json | jq -r '.site.url')
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "🌐 Site deployed to: $DEPLOY_URL"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          
      - name: 📊 Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ steps.deploy-url.outputs.url }}
            ${{ steps.deploy-url.outputs.url }}/login
          configPath: './.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Job 3: Preview Deploy for PRs
  preview-deploy:
    name: 🔍 Preview Deploy
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          
      - name: 🔍 Deploy Preview
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=out --message="Preview deploy for PR #${{ github.event.number }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          
      - name: 💬 Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha
            });
            
            if (deployments.length > 0) {
              const previewUrl = `https://deploy-preview-${{ github.event.number }}--neonpro.netlify.app`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Deploy Preview Ready!**
                
                ✅ **Preview URL**: ${previewUrl}
                🔐 **Login**: ${previewUrl}/login
                📊 **Dashboard**: ${previewUrl}/dashboard
                
                🧪 **Test Checklist**:
                - [ ] Design System GRUPO US
                - [ ] Responsividade
                - [ ] Formulário de autenticação
                - [ ] Navegação por teclado
                - [ ] Performance
                
                Built from commit: ${context.sha.substring(0, 7)}`
              });
            }

  # Job 4: Notify Success
  notify:
    name: 📢 Notify Success
    needs: [build-and-test, deploy]
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: 🎉 Success Notification
        run: |
          echo "🎉 NEONPRO successfully deployed to production!"
          echo "🌐 Site URL: https://neonpro.netlify.app"
          echo "📊 Dashboard: https://neonpro.netlify.app/dashboard"
          echo "🔐 Login: https://neonpro.netlify.app/login"
