# Decision Consensus Workflow Template
# Specialized workflow for building consensus from multiple perspectives and resolving complex decisions

workflow_definition:
  name: "Decision Consensus Workflow"
  description: "Comprehensive workflow for analyzing complex decisions, gathering multiple perspectives, and building informed consensus"
  version: "1.0"
  complexity_level: 5
  estimated_duration: "2-3 hours"
  execution_mode: "sequential"
  
workflow_metadata:
  created_by: "workflow-orchestrator"
  created_at: "2025-01-31"
  use_cases:
    - "Complex technical decision making"
    - "Architecture choice evaluation and selection"
    - "Technology stack selection with trade-off analysis"
    - "Strategic planning with multiple stakeholder perspectives"
    - "Conflict resolution between competing approaches"
    - "Risk-benefit analysis for major decisions"
  
quality_standards:
  minimum_quality_score: 9.0
  decision_confidence_requirement: 85
  stakeholder_alignment_target: 80
  evidence_quality_threshold: 8.5

# Sequential Agent Execution Definition
agents:
  - agent_id: "comprehensive_research_phase"
    agent_type: "apex-researcher"
    execution_order: 1
    estimated_duration: "45-60 minutes"
    description: "Comprehensive research of decision options, alternatives, and supporting evidence"
    
    input_requirements:
      - "decision_context"
      - "available_options"
      - "evaluation_criteria"
      - "stakeholder_requirements"
      
    output_deliverables:
      - "option_analysis_report"
      - "evidence_compilation"
      - "trade_off_analysis"
      - "risk_assessment"
      - "best_practices_review"
      
    quality_standards:
      - name: "Research Comprehensiveness"
        criteria: "Thorough analysis of all decision options with quality evidence"
        minimum_score: 9.0
      - name: "Evidence Quality"
        criteria: "High-quality, authoritative evidence supporting analysis"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "architectural_evaluation_phase"
      critical_outputs:
        - "technical_implications"
        - "implementation_considerations"
        - "scalability_factors"
        - "integration_requirements"
        
  - agent_id: "architectural_evaluation_phase"
    agent_type: "apex-architect"
    execution_order: 2
    estimated_duration: "45-60 minutes"
    description: "Architectural evaluation of decision options with technical feasibility analysis"
    
    dependencies:
      - agent_id: "comprehensive_research_phase"
        required_outputs: ["option_analysis_report", "evidence_compilation"]
        
    input_requirements:
      - "option_analysis_report"
      - "technical_implications"
      - "system_architecture_context"
      - "scalability_requirements"
      
    output_deliverables:
      - "architectural_impact_analysis"
      - "technical_feasibility_assessment"
      - "implementation_complexity_evaluation"
      - "integration_strategy_options"
      - "long_term_architectural_implications"
      
    quality_standards:
      - name: "Architectural Analysis Quality"
        criteria: "Thorough architectural evaluation with clear technical implications"
        minimum_score: 9.0
      - name: "Feasibility Assessment Accuracy"
        criteria: "Accurate assessment of technical feasibility and complexity"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "implementation_perspective_phase"
      critical_outputs:
        - "implementation_guidance"
        - "technical_constraints"
        - "architecture_recommendations"
        - "integration_considerations"
        
  - agent_id: "implementation_perspective_phase"
    agent_type: "apex-developer"
    execution_order: 3
    estimated_duration: "30-45 minutes"
    description: "Implementation perspective analysis focusing on practical development considerations"
    
    dependencies:
      - agent_id: "architectural_evaluation_phase"
        required_outputs: ["architectural_impact_analysis", "technical_feasibility_assessment"]
        
    input_requirements:
      - "architectural_impact_analysis"
      - "implementation_guidance"
      - "development_constraints"
      - "team_capabilities"
      
    output_deliverables:
      - "implementation_perspective_report"
      - "development_effort_estimation"
      - "technical_risk_assessment"
      - "maintenance_considerations"
      - "team_readiness_evaluation"
      
    quality_standards:
      - name: "Implementation Analysis Quality"
        criteria: "Realistic and practical implementation perspective with accurate effort estimation"
        minimum_score: 8.5
      - name: "Risk Assessment Accuracy"
        criteria: "Accurate identification and assessment of implementation risks"
        minimum_score: 9.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "quality_validation_perspective_phase"
      critical_outputs:
        - "implementation_risks"
        - "quality_requirements"
        - "testing_considerations"
        - "maintenance_implications"
        
  - agent_id: "quality_validation_perspective_phase"
    agent_type: "apex-qa-debugger"
    execution_order: 4
    estimated_duration: "30-45 minutes"
    description: "Quality and validation perspective on decision options with testing and reliability considerations"
    
    dependencies:
      - agent_id: "implementation_perspective_phase"
        required_outputs: ["implementation_perspective_report", "technical_risk_assessment"]
        
    input_requirements:
      - "implementation_perspective_report"
      - "quality_requirements"
      - "testing_considerations"
      - "reliability_standards"
      
    output_deliverables:
      - "quality_perspective_analysis"
      - "testing_strategy_implications"
      - "reliability_impact_assessment"
      - "quality_assurance_requirements"
      - "validation_complexity_analysis"
      
    quality_standards:
      - name: "Quality Analysis Thoroughness"
        criteria: "Comprehensive quality perspective with clear testing and validation implications"
        minimum_score: 9.0
      - name: "Reliability Assessment Quality"
        criteria: "Accurate assessment of reliability and quality implications"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "consensus_building_phase"
      critical_outputs:
        - "quality_implications"
        - "validation_requirements"
        - "reliability_considerations"
        - "quality_trade_offs"

# Comprehensive Consensus Building
consensus_building:
  agent_id: "consensus_building_phase"
  agent_type: "consensus-builder"
  execution_order: 5
  estimated_duration: "30-45 minutes"
  description: "Comprehensive consensus building integrating all agent perspectives for informed decision making"
  
  input_sources:
    - "comprehensive_research_phase"
    - "architectural_evaluation_phase"
    - "implementation_perspective_phase"
    - "quality_validation_perspective_phase"
    
  consensus_criteria:
    minimum_agent_agreement: 80
    evidence_quality_threshold: 8.5
    decision_confidence_threshold: 85
    stakeholder_alignment_threshold: 80
    
  consensus_methodology:
    weighting_strategy: "expertise_and_evidence_based"
    conflict_resolution: "compromise_synthesis_with_evidence_prioritization"
    minority_opinion_preservation: true
    alternative_documentation: "comprehensive"
    
  output_deliverables:
    - "consensus_decision_report"
    - "unified_recommendation"
    - "decision_rationale_documentation"
    - "implementation_roadmap"
    - "success_criteria_definition"
    - "monitoring_and_evaluation_plan"
    - "alternative_options_preservation"
    - "risk_mitigation_strategy"

# Quality Gates for Decision Making
quality_gates:
  - gate_id: "research_completeness_gate"
    trigger_after: "comprehensive_research_phase"
    validation_criteria:
      - "Option analysis completeness >= 95%"
      - "Evidence quality score >= 8.5"
      - "Trade-off analysis thoroughness >= 90%"
    failure_action: "expand_research_analysis"
    
  - gate_id: "architectural_evaluation_gate"
    trigger_after: "architectural_evaluation_phase"
    validation_criteria:
      - "Architectural analysis quality >= 9.0"
      - "Feasibility assessment completeness >= 90%"
      - "Technical implications clarity >= 8.5"
    failure_action: "deepen_architectural_evaluation"
    
  - gate_id: "implementation_perspective_gate"
    trigger_after: "implementation_perspective_phase"
    validation_criteria:
      - "Implementation analysis quality >= 8.5"
      - "Risk assessment accuracy >= 9.0"
      - "Effort estimation confidence >= 80%"
    failure_action: "refine_implementation_analysis"
    
  - gate_id: "quality_perspective_gate"
    trigger_after: "quality_validation_perspective_phase"
    validation_criteria:
      - "Quality analysis thoroughness >= 9.0"
      - "Reliability assessment quality >= 8.5"
      - "Testing implications clarity >= 85%"
    failure_action: "enhance_quality_perspective"
    
  - gate_id: "consensus_quality_gate"
    trigger_after: "consensus_building_phase"
    validation_criteria:
      - "Decision confidence >= 85%"
      - "Agent agreement level >= 80%"
      - "Evidence foundation strength >= 8.5"
    failure_action: "strengthen_consensus_building"

# Memory and Learning Integration
memory_integration:
  persistent_storage: true
  cross_session_learning: true
  pattern_recognition: true
  decision_pattern_focus: true
  
  memory_points:
    - after_phase: "comprehensive_research_phase"
      store_patterns: ["effective_decision_research_methods", "quality_evidence_identification", "trade_off_analysis_techniques"]
    - after_phase: "architectural_evaluation_phase"
      store_patterns: ["architectural_decision_frameworks", "feasibility_assessment_methods", "technical_evaluation_approaches"]
    - after_phase: "implementation_perspective_phase"
      store_patterns: ["implementation_evaluation_techniques", "risk_assessment_methods", "effort_estimation_strategies"]
    - after_phase: "quality_validation_perspective_phase"
      store_patterns: ["quality_decision_analysis", "reliability_evaluation_methods", "validation_strategy_development"]
    - after_phase: "consensus_building_phase"
      store_patterns: ["effective_consensus_building_strategies", "conflict_resolution_techniques", "decision_synthesis_methods"]

# Performance and Quality Monitoring
performance_monitoring:
  track_execution_time: true
  measure_quality_scores: true
  monitor_decision_confidence: true
  track_consensus_effectiveness: true
  
  success_metrics:
    - name: "Decision Quality Achievement"
      target: ">= 90%"
      measurement: "Decision quality scores meeting high standards"
      
    - name: "Consensus Building Effectiveness"
      target: ">= 80% agent agreement"
      measurement: "Level of agreement achieved across all agent perspectives"
      
    - name: "Evidence Foundation Strength"
      target: ">= 8.5/10 evidence quality"
      measurement: "Quality and reliability of evidence supporting the decision"
      
    - name: "Decision Confidence Achievement"
      target: ">= 85% confidence"
      measurement: "Overall confidence in the consensus decision"

# Decision-Focused Contingency Plans
contingency_plans:
  - scenario: "research_analysis_insufficient"
    trigger: "Research completeness gate failure"
    recovery_actions:
      - "Expand research scope to cover missing decision aspects"
      - "Seek additional authoritative sources and evidence"
      - "Deepen trade-off analysis with quantitative data"
      
  - scenario: "architectural_evaluation_gaps"
    trigger: "Architectural evaluation gate failure"
    recovery_actions:
      - "Enhance technical feasibility analysis"
      - "Clarify architectural implications and constraints"
      - "Consult additional architectural expertise"
      
  - scenario: "implementation_perspective_insufficient"
    trigger: "Implementation perspective gate failure"
    recovery_actions:
      - "Refine implementation risk assessment"
      - "Improve effort estimation accuracy"
      - "Strengthen practical implementation analysis"
      
  - scenario: "quality_perspective_gaps"
    trigger: "Quality perspective gate failure"
    recovery_actions:
      - "Deepen quality and reliability impact analysis"
      - "Enhance testing strategy implications assessment"
      - "Strengthen validation complexity evaluation"
      
  - scenario: "consensus_building_challenges"
    trigger: "Consensus quality gate failure"
    recovery_actions:
      - "Apply advanced conflict resolution techniques"
      - "Re-weight evidence and expertise factors"
      - "Seek additional stakeholder input for alignment"
      - "Focus on compromise solutions with acceptable trade-offs"