# Unified APEX + Multi-Agent Workflow Template
# Demonstrates seamless integration between traditional APEX agents and multi-agent coordination system

workflow_definition:
  name: "Unified APEX Multi-Agent Enterprise Workflow"
  version: "1.0"
  complexity_level: 8
  estimated_duration: "6-8 hours"
  quality_target: 9.7
  
  description: |
    Revolutionary workflow combining the specialized expertise of APEX agents 
    with the coordination intelligence of the multi-agent system. Provides 
    enterprise-grade execution with persistent memory, learning aggregation, 
    and consensus building.

system_integration:
  apex_agents_utilized: ["apex-researcher", "apex-architect", "apex-developer", "apex-qa-debugger"]
  coordination_agents_utilized: ["memory-coordinator", "context-manager", "learning-aggregator", "workflow-orchestrator", "consensus-builder"]
  cross_system_communication: true
  memory_persistence: true
  learning_capture: enabled

workflow_phases:
  phase_1_initialization:
    name: "Memory & Context Initialization"
    duration: "5-10 minutes"
    agents: ["memory-coordinator", "workflow-orchestrator"]
    objectives:
      - Initialize persistent memory context
      - Load relevant historical patterns and learnings
      - Establish workflow orchestration framework
      - Set up cross-system communication protocols
    
    deliverables:
      - Persistent memory context established
      - Historical patterns loaded and available
      - Workflow orchestration plan created
      - Communication protocols activated
    
    quality_gates:
      - Memory system operational ≥99% reliability
      - Context loading successful with ≥95% relevance
      - Workflow orchestration plan approved ≥9.5/10 quality

  phase_2_comprehensive_research:
    name: "APEX Research with Learning Integration"
    duration: "90-120 minutes"
    primary_agent: "apex-researcher"
    coordination_support: ["context-manager", "learning-aggregator"]
    objectives:
      - Conduct comprehensive technical research using APEX expertise
      - Integrate findings with existing learning patterns
      - Bridge context for architectural phase
      - Capture new research patterns for future use
    
    cross_system_workflow:
      step_1: "apex-researcher → conduct comprehensive technical research"
      step_2: "context-manager → optimize and bridge research context"
      step_3: "learning-aggregator → extract and store research patterns"
      step_4: "memory-coordinator → persist research findings"
    
    deliverables:
      - Comprehensive research report (APEX quality)
      - Optimized context package for next phase
      - New research patterns captured
      - Persistent research memory established
    
    quality_gates:
      - Research depth score ≥9.5/10
      - Context optimization ≥90% compression with ≥95% relevance preservation
      - Pattern extraction quality ≥9.0/10

  phase_3_architectural_synthesis:
    name: "APEX Architecture with Multi-Agent Consensus"
    duration: "120-150 minutes"
    primary_agent: "apex-architect"
    coordination_support: ["context-manager", "consensus-builder", "memory-coordinator"]
    objectives:
      - Design enterprise architecture using APEX architectural expertise
      - Synthesize multiple architectural approaches through consensus
      - Integrate architectural decisions with persistent memory
      - Prepare optimized context for development phase
    
    cross_system_workflow:
      step_1: "context-manager → provide optimized research context to apex-architect"
      step_2: "apex-architect → develop comprehensive architectural design"
      step_3: "consensus-builder → synthesize architectural options and build consensus"
      step_4: "memory-coordinator → persist architectural decisions and rationale"
      step_5: "context-manager → optimize architectural context for development handoff"
    
    deliverables:
      - Enterprise architectural design (APEX quality)
      - Consensus-built architectural recommendations
      - Architectural decision log with rationale
      - Optimized development context package
    
    quality_gates:
      - Architectural quality score ≥9.6/10
      - Consensus confidence level ≥85%
      - Context handoff quality ≥95%

  phase_4_coordinated_development:
    name: "APEX Development with Workflow Orchestration"
    duration: "180-240 minutes"
    primary_agent: "apex-developer"
    coordination_support: ["workflow-orchestrator", "context-manager", "learning-aggregator"]
    objectives:
      - Implement features using APEX development expertise
      - Coordinate development tasks through workflow orchestration
      - Continuously capture development patterns and learnings
      - Maintain context quality throughout development
    
    cross_system_workflow:
      step_1: "workflow-orchestrator → break down development into coordinated subtasks"
      step_2: "context-manager → provide optimized architectural context"
      step_3: "apex-developer → implement features with APEX expertise"
      step_4: "learning-aggregator → capture development patterns during implementation"
      step_5: "context-manager → optimize implementation context for QA handoff"
    
    deliverables:
      - High-quality implementation code (APEX standards)
      - Development patterns captured and stored
      - Comprehensive test suite
      - QA-ready context package
    
    quality_gates:
      - Code quality score ≥9.3/10
      - Test coverage ≥90%
      - Pattern capture quality ≥85%

  phase_5_quality_assurance_consensus:
    name: "APEX QA with Multi-Agent Validation"
    duration: "60-90 minutes"
    primary_agent: "apex-qa-debugger"
    coordination_support: ["consensus-builder", "learning-aggregator", "memory-coordinator"]
    objectives:
      - Conduct comprehensive QA using APEX debugging expertise
      - Build consensus on quality validation across multiple perspectives
      - Capture QA patterns and lessons learned
      - Prepare final consensus and recommendations
    
    cross_system_workflow:
      step_1: "apex-qa-debugger → comprehensive quality assurance and testing"
      step_2: "consensus-builder → synthesize QA results with architectural and development insights"
      step_3: "learning-aggregator → capture QA patterns and quality insights"
      step_4: "memory-coordinator → persist complete workflow execution results"
    
    deliverables:
      - Comprehensive QA validation report (APEX quality)
      - Multi-perspective quality consensus
      - QA patterns and insights captured
      - Complete workflow execution memory
    
    quality_gates:
      - QA validation score ≥9.5/10
      - Consensus confidence ≥90%
      - Complete workflow memory persistence confirmed

  phase_6_enterprise_consensus:
    name: "Final Consensus and Knowledge Synthesis"
    duration: "30-45 minutes"
    primary_agent: "consensus-builder"
    coordination_support: ["learning-aggregator", "memory-coordinator"]
    objectives:
      - Build final enterprise-grade consensus from all phases
      - Synthesize complete workflow learnings
      - Update persistent knowledge base
      - Provide enterprise recommendations
    
    deliverables:
      - Enterprise consensus recommendations
      - Complete workflow learning synthesis
      - Updated persistent knowledge base
      - Strategic next steps guidance
    
    quality_gates:
      - Final consensus confidence ≥90%
      - Knowledge synthesis quality ≥9.5/10
      - Strategic recommendations approved ≥9.7/10

cross_system_benefits:
  apex_expertise_preservation: "Full APEX specialized knowledge utilized throughout workflow"
  coordination_intelligence: "Multi-agent coordination optimizes workflow execution"
  persistent_memory: "Cross-session learning and context preservation"
  quality_amplification: "Combined quality standards exceed individual agent capabilities"
  learning_acceleration: "Patterns captured from both APEX and coordination perspectives"
  enterprise_readiness: "Consensus building ensures enterprise-grade decision quality"

performance_metrics:
  estimated_total_duration: "6-8 hours"
  quality_target: "≥9.7/10"
  context_preservation_rate: "≥95%"
  learning_pattern_capture_rate: "≥85%"
  consensus_confidence_target: "≥90%"
  memory_persistence_reliability: "≥99%"

execution_triggers:
  complexity_threshold: "≥7.5 (enterprise-level tasks)"
  multi_domain_requirements: "Tasks requiring multiple APEX specialties"
  strategic_importance: "High business impact decisions"
  learning_value: "Tasks with high pattern reusability potential"
  consensus_requirements: "Decisions requiring stakeholder alignment"

fallback_protocols:
  apex_agent_failure: "Coordination agents can provide alternative implementation paths"
  coordination_agent_failure: "APEX agents can continue with reduced coordination features"
  memory_system_failure: "Workflow continues with session-only memory"
  consensus_failure: "Primary agent recommendations used with documented alternatives"

success_criteria:
  deliverable_quality: "All deliverables meet ≥9.5/10 quality standards"
  workflow_completion: "All phases completed within estimated timeframes"
  learning_capture: "New patterns successfully captured and stored"
  consensus_achievement: "Final recommendations have ≥90% confidence"
  memory_persistence: "All critical context and learnings persisted successfully"
  stakeholder_satisfaction: "Enterprise-grade outcomes achieved"

integration_notes: |
  This template demonstrates the revolutionary potential of combining APEX agent 
  expertise with multi-agent coordination intelligence. The result is a workflow 
  that exceeds the capabilities of either system alone, providing enterprise-grade 
  execution with learning, memory, and consensus capabilities that scale across 
  sessions and projects.
  
  Key innovation: Seamless handoffs between APEX technical expertise and coordination 
  intelligence, resulting in outcomes that are both technically excellent and 
  strategically aligned.