# QA and Optimization Workflow Template
# Specialized workflow for quality assurance, debugging, and performance optimization

workflow_definition:
  name: "QA and Optimization Workflow"
  description: "Comprehensive quality assurance and optimization workflow for existing code and systems"
  version: "1.0"
  complexity_level: 6
  estimated_duration: "2-4 hours"
  execution_mode: "sequential"
  
workflow_metadata:
  created_by: "workflow-orchestrator"
  created_at: "2025-01-31"
  use_cases:
    - "Code quality assessment and improvement"
    - "Performance optimization and tuning"
    - "Bug investigation and resolution"
    - "Security vulnerability assessment"
    - "System reliability enhancement"
    - "Technical debt reduction"
  
quality_standards:
  minimum_quality_score: 9.0
  performance_improvement_target: "15%"
  security_vulnerability_tolerance: 0
  code_coverage_target: 95

# Sequential Agent Execution Definition
agents:
  - agent_id: "architectural_review_phase"
    agent_type: "apex-architect"
    execution_order: 1
    estimated_duration: "45-60 minutes"
    description: "Architectural review and optimization opportunity identification"
    
    input_requirements:
      - "existing_codebase"
      - "system_architecture_documentation"
      - "performance_requirements"
      - "scalability_constraints"
      
    output_deliverables:
      - "architectural_assessment"
      - "optimization_opportunities"
      - "scalability_improvements"
      - "technical_debt_analysis"
      - "refactoring_recommendations"
      
    quality_standards:
      - name: "Architectural Analysis Depth"
        criteria: "Comprehensive analysis of architectural strengths and weaknesses"
        minimum_score: 9.0
      - name: "Optimization Opportunity Identification"
        criteria: "Clear identification of performance and scalability improvements"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "comprehensive_qa_phase"
      critical_outputs:
        - "architectural_issues"
        - "performance_bottlenecks"
        - "refactoring_priorities"
        - "optimization_targets"
        
  - agent_id: "comprehensive_qa_phase"
    agent_type: "apex-qa-debugger"
    execution_order: 2
    estimated_duration: "90-150 minutes"
    description: "Comprehensive quality assurance, testing, and debugging analysis"
    
    dependencies:
      - agent_id: "architectural_review_phase"
        required_outputs: ["architectural_assessment", "optimization_opportunities"]
        
    input_requirements:
      - "existing_codebase"
      - "architectural_assessment"
      - "optimization_opportunities"
      - "quality_requirements"
      
    output_deliverables:
      - "comprehensive_qa_report"
      - "bug_analysis_and_fixes"
      - "performance_optimization_plan"
      - "security_assessment"
      - "test_coverage_analysis"
      - "quality_improvement_roadmap"
      
    quality_standards:
      - name: "QA Analysis Comprehensiveness"
        criteria: "Thorough analysis covering functionality, performance, security, and maintainability"
        minimum_score: 9.5
      - name: "Issue Detection Accuracy"
        criteria: "Accurate identification and prioritization of issues"
        minimum_score: 9.0
      - name: "Solution Quality"
        criteria: "High-quality solutions and recommendations"
        minimum_score: 9.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "implementation_optimization_phase"
      critical_outputs:
        - "critical_issues_identified"
        - "optimization_implementation_plan"
        - "testing_enhancement_strategy"
        - "quality_validation_criteria"
        
  - agent_id: "implementation_optimization_phase"
    agent_type: "apex-developer"
    execution_order: 3
    estimated_duration: "45-90 minutes"
    description: "Implementation of quality improvements and performance optimizations"
    
    dependencies:
      - agent_id: "comprehensive_qa_phase"
        required_outputs: ["comprehensive_qa_report", "performance_optimization_plan"]
        
    input_requirements:
      - "comprehensive_qa_report"
      - "performance_optimization_plan"
      - "quality_improvement_roadmap"
      - "optimization_implementation_priorities"
      
    output_deliverables:
      - "optimized_code_implementations"
      - "performance_improvements"
      - "enhanced_test_suites"
      - "refactored_components"
      - "optimization_validation_results"
      
    quality_standards:
      - name: "Optimization Implementation Quality"
        criteria: "High-quality implementation of optimizations and improvements"
        minimum_score: 9.5
      - name: "Performance Improvement Achievement"
        criteria: "Measurable performance improvements achieved"
        minimum_score: 9.0
      - name: "Code Quality Enhancement"
        criteria: "Demonstrable improvement in code quality metrics"
        minimum_score: 9.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "validation_and_learning_phase"
      critical_outputs:
        - "optimization_results"
        - "performance_metrics"
        - "quality_improvements"
        - "validation_requirements"
        
  - agent_id: "validation_and_learning_phase"
    agent_type: "learning-aggregator"
    execution_order: 4
    estimated_duration: "30-45 minutes"
    description: "Validation of improvements and consolidation of optimization learnings"
    
    dependencies:
      - agent_id: "architectural_review_phase"
        required_outputs: ["architectural_assessment", "optimization_opportunities"]
      - agent_id: "comprehensive_qa_phase"
        required_outputs: ["comprehensive_qa_report", "quality_improvement_roadmap"]
      - agent_id: "implementation_optimization_phase"
        required_outputs: ["optimized_code_implementations", "performance_improvements"]
        
    input_requirements:
      - "optimization_results"
      - "performance_metrics"
      - "quality_improvements"
      - "cross_agent_insights"
      
    output_deliverables:
      - "optimization_validation_report"
      - "performance_improvement_confirmation"
      - "quality_enhancement_verification"
      - "learned_optimization_patterns"
      - "future_optimization_recommendations"
      
    quality_standards:
      - name: "Validation Thoroughness"
        criteria: "Comprehensive validation of all implemented optimizations"
        minimum_score: 9.0
      - name: "Learning Pattern Quality"
        criteria: "High-quality extraction of reusable optimization patterns"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "optimization_consensus_phase"
      critical_outputs:
        - "validated_improvements"
        - "optimization_success_confirmation"
        - "learned_best_practices"
        - "continuous_improvement_recommendations"

# Optimization Consensus Building
consensus_building:
  agent_id: "optimization_consensus_phase"
  agent_type: "consensus-builder"
  execution_order: 5
  estimated_duration: "20-30 minutes"
  description: "Build consensus on optimization results and future improvement strategies"
  
  input_sources:
    - "architectural_review_phase"
    - "comprehensive_qa_phase"
    - "implementation_optimization_phase"
    - "validation_and_learning_phase"
    
  consensus_criteria:
    minimum_agent_agreement: 85
    evidence_quality_threshold: 9.0
    optimization_effectiveness_score: 9.0
    
  output_deliverables:
    - "optimization_success_assessment"
    - "unified_improvement_recommendations"
    - "continuous_optimization_strategy"
    - "monitoring_and_maintenance_plan"
    - "future_enhancement_roadmap"

# Quality Gates for Optimization
quality_gates:
  - gate_id: "architectural_review_gate"
    trigger_after: "architectural_review_phase"
    validation_criteria:
      - "Architectural analysis completeness >= 95%"
      - "Optimization opportunity identification >= 90%"
      - "Technical debt analysis thoroughness >= 85%"
    failure_action: "deepen_architectural_analysis"
    
  - gate_id: "comprehensive_qa_gate"
    trigger_after: "comprehensive_qa_phase"
    validation_criteria:
      - "QA analysis score >= 9.5"
      - "Critical issue detection completeness >= 100%"
      - "Performance optimization plan quality >= 9.0"
    failure_action: "enhance_qa_analysis"
    
  - gate_id: "implementation_optimization_gate"
    trigger_after: "implementation_optimization_phase"
    validation_criteria:
      - "Optimization implementation quality >= 9.5"
      - "Performance improvement target achieved >= 15%"
      - "Code quality improvement confirmed = true"
    failure_action: "refine_optimization_implementation"
    
  - gate_id: "validation_learning_gate"
    trigger_after: "validation_and_learning_phase"
    validation_criteria:
      - "Optimization validation completeness >= 95%"
      - "Learning pattern extraction quality >= 8.5"
      - "Performance improvement confirmation = verified"
    failure_action: "strengthen_validation_and_learning"

# Memory and Learning Integration
memory_integration:
  persistent_storage: true
  cross_session_learning: true
  pattern_recognition: true
  optimization_pattern_focus: true
  
  memory_points:
    - after_phase: "architectural_review_phase"
      store_patterns: ["effective_architectural_analysis_methods", "optimization_opportunity_identification_techniques", "technical_debt_assessment_strategies"]
    - after_phase: "comprehensive_qa_phase"
      store_patterns: ["comprehensive_qa_methodologies", "effective_debugging_approaches", "performance_optimization_strategies"]
    - after_phase: "implementation_optimization_phase"
      store_patterns: ["successful_optimization_implementations", "performance_improvement_techniques", "code_quality_enhancement_methods"]
    - after_phase: "validation_and_learning_phase"
      store_patterns: ["optimization_validation_methods", "performance_measurement_techniques", "continuous_improvement_strategies"]

# Performance Monitoring and Metrics
performance_monitoring:
  track_execution_time: true
  measure_quality_scores: true
  monitor_optimization_effectiveness: true
  track_performance_improvements: true
  
  success_metrics:
    - name: "Quality Improvement Achievement"
      target: ">= 95%"
      measurement: "Quality score improvements achieved as planned"
      
    - name: "Performance Optimization Success"
      target: ">= 15% improvement"
      measurement: "Measurable performance improvements achieved"
      
    - name: "Issue Resolution Effectiveness"
      target: ">= 90%"
      measurement: "Critical and high-priority issues successfully resolved"
      
    - name: "Optimization Workflow Efficiency"
      target: "<= 110% of estimated time"
      measurement: "Actual vs estimated execution time for optimization workflow"

# Optimization-Focused Contingency Plans
contingency_plans:
  - scenario: "architectural_analysis_insufficient"
    trigger: "Architectural review gate failure"
    recovery_actions:
      - "Deepen architectural analysis with additional metrics"
      - "Expand technical debt assessment scope"
      - "Consult additional architectural expertise"
      
  - scenario: "qa_analysis_gaps"
    trigger: "Comprehensive QA gate failure"
    recovery_actions:
      - "Enhance critical issue detection methodologies"
      - "Expand performance analysis scope"
      - "Strengthen security assessment coverage"
      
  - scenario: "optimization_implementation_shortfall"
    trigger: "Implementation optimization gate failure"
    recovery_actions:
      - "Refine optimization implementation approach"
      - "Focus on highest-impact performance improvements"
      - "Iteratively improve until targets are met"
      
  - scenario: "validation_learning_incomplete"
    trigger: "Validation learning gate failure"
    recovery_actions:
      - "Strengthen optimization validation methodologies"
      - "Enhance performance measurement accuracy"
      - "Improve learning pattern extraction techniques"
      
  - scenario: "optimization_consensus_challenges"
    trigger: "Low consensus on optimization effectiveness"
    recovery_actions:
      - "Re-evaluate optimization success criteria"
      - "Focus consensus on highest-impact improvements"
      - "Document optimization trade-offs and decisions"