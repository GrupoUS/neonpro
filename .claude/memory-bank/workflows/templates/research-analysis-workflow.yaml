# Research Analysis Workflow Template
# Sequential workflow focused on comprehensive research and analysis tasks

workflow_definition:
  name: "Research Analysis Workflow" 
  description: "Comprehensive research and analysis workflow with architectural insights and learning consolidation"
  version: "1.0"
  complexity_level: 5
  estimated_duration: "2-3 hours"
  execution_mode: "sequential"
  
workflow_metadata:
  created_by: "workflow-orchestrator"
  created_at: "2025-01-31"
  use_cases:
    - "Technology research and evaluation"
    - "Market analysis and competitive research"
    - "Best practices investigation"
    - "Feasibility studies and impact analysis"
    - "Knowledge acquisition and synthesis"
  
quality_standards:
  minimum_quality_score: 8.5
  research_depth_requirement: "comprehensive"
  source_authority_requirement: "high"
  analysis_completeness: "detailed"

# Sequential Agent Execution Definition
agents:
  - agent_id: "primary_research_phase"
    agent_type: "apex-researcher"
    execution_order: 1
    estimated_duration: "60-90 minutes"
    description: "Primary research phase for comprehensive information gathering and analysis"
    
    input_requirements:
      - "research_objectives"
      - "scope_definition"
      - "information_requirements"
      - "quality_criteria"
      
    output_deliverables:
      - "comprehensive_research_findings"
      - "source_analysis_report"
      - "key_insights_summary"
      - "trend_analysis"
      - "gap_identification"
      
    quality_standards:
      - name: "Research Depth"
        criteria: "Comprehensive coverage of all research objectives"
        minimum_score: 9.0
      - name: "Source Authority"
        criteria: "Use of authoritative, current, and reliable sources"
        minimum_score: 8.5
      - name: "Analysis Quality"
        criteria: "Deep analysis with actionable insights"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "architectural_analysis_phase"
      critical_outputs:
        - "technical_findings"
        - "implementation_considerations"
        - "architectural_implications"
        - "constraint_analysis"
        
  - agent_id: "architectural_analysis_phase"
    agent_type: "apex-architect"
    execution_order: 2
    estimated_duration: "45-60 minutes"
    description: "Architectural analysis and technical implications assessment"
    
    dependencies:
      - agent_id: "primary_research_phase"
        required_outputs: ["comprehensive_research_findings", "technical_findings"]
        
    input_requirements:
      - "comprehensive_research_findings"
      - "technical_findings"
      - "architectural_context"
      - "system_constraints"
      
    output_deliverables:
      - "architectural_implications_analysis"
      - "technical_feasibility_assessment"
      - "integration_considerations"
      - "scalability_implications"
      - "technology_recommendations"
      
    quality_standards:
      - name: "Technical Analysis Quality"
        criteria: "Thorough technical analysis with clear implications"
        minimum_score: 9.0
      - name: "Feasibility Assessment"
        criteria: "Realistic and well-reasoned feasibility evaluation"
        minimum_score: 8.5
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "learning_consolidation_phase"
      critical_outputs:
        - "technical_recommendations"
        - "implementation_roadmap"
        - "risk_assessment"
        - "decision_factors"
        
  - agent_id: "learning_consolidation_phase"
    agent_type: "learning-aggregator"
    execution_order: 3
    estimated_duration: "30-45 minutes"
    description: "Consolidate learnings and extract reusable patterns from research and analysis"
    
    dependencies:
      - agent_id: "primary_research_phase"
        required_outputs: ["comprehensive_research_findings", "key_insights_summary"]
      - agent_id: "architectural_analysis_phase"
        required_outputs: ["architectural_implications_analysis", "technical_feasibility_assessment"]
        
    input_requirements:
      - "comprehensive_research_findings"
      - "architectural_implications_analysis"
      - "cross_agent_insights"
      - "pattern_identification_scope"
      
    output_deliverables:
      - "consolidated_learnings"
      - "extracted_patterns"
      - "reusable_insights"
      - "knowledge_base_updates"
      - "future_application_recommendations"
      
    quality_standards:
      - name: "Learning Consolidation Quality"
        criteria: "Effective consolidation with actionable patterns"
        minimum_score: 8.5
      - name: "Pattern Extraction"
        criteria: "Clear, reusable patterns with confidence scoring"
        minimum_score: 8.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "consensus_synthesis_phase"
      critical_outputs:
        - "synthesized_recommendations"
        - "confidence_assessments"
        - "implementation_priorities"
        - "success_criteria"

# Consensus and Synthesis Phase        
consensus_building:
  agent_id: "consensus_synthesis_phase"
  agent_type: "consensus-builder"
  execution_order: 4
  estimated_duration: "20-30 minutes"
  description: "Synthesize consensus from research, analysis, and learning insights"
  
  input_sources:
    - "primary_research_phase"
    - "architectural_analysis_phase"
    - "learning_consolidation_phase"
    
  consensus_criteria:
    minimum_agent_agreement: 75
    evidence_quality_threshold: 8.0
    implementation_feasibility_score: 8.5
    
  output_deliverables:
    - "research_synthesis_report"
    - "unified_recommendations"
    - "action_plan"
    - "confidence_assessment"
    - "follow_up_recommendations"

# Workflow Quality Gates
quality_gates:
  - gate_id: "research_completeness_gate"
    trigger_after: "primary_research_phase"
    validation_criteria:
      - "Research objective coverage >= 95%"
      - "Source authority score >= 8.5"
      - "Analysis depth score >= 8.5"
    failure_action: "expand_research_scope"
    
  - gate_id: "technical_analysis_gate"
    trigger_after: "architectural_analysis_phase"
    validation_criteria:
      - "Technical analysis completeness >= 90%"
      - "Feasibility assessment quality >= 8.5"
      - "Integration consideration completeness >= 85%"
    failure_action: "deepen_technical_analysis"
    
  - gate_id: "learning_consolidation_gate"
    trigger_after: "learning_consolidation_phase"
    validation_criteria:
      - "Pattern extraction quality >= 8.0"
      - "Learning consolidation completeness >= 90%"
      - "Reusability score >= 7.5"
    failure_action: "enhance_pattern_extraction"

# Memory and Learning Integration
memory_integration:
  persistent_storage: true
  cross_session_learning: true
  pattern_recognition: true
  knowledge_base_updates: true
  
  memory_points:
    - after_phase: "primary_research_phase"
      store_patterns: ["effective_research_methodologies", "high_quality_sources", "analysis_techniques"]
    - after_phase: "architectural_analysis_phase"
      store_patterns: ["technical_evaluation_methods", "feasibility_assessment_approaches", "integration_analysis_patterns"]
    - after_phase: "learning_consolidation_phase"
      store_patterns: ["successful_consolidation_strategies", "pattern_extraction_methods", "knowledge_synthesis_approaches"]

# Performance and Monitoring
performance_monitoring:
  track_execution_time: true
  measure_quality_scores: true
  monitor_learning_effectiveness: true
  
  success_metrics:
    - name: "Research Quality Achievement"
      target: ">= 90%"
      measurement: "Research quality scores meeting minimum thresholds"
      
    - name: "Analysis Completeness"
      target: ">= 85%"
      measurement: "Completeness of technical and architectural analysis"
      
    - name: "Learning Consolidation Effectiveness"
      target: ">= 80%"
      measurement: "Quality and reusability of extracted patterns"
      
    - name: "Workflow Efficiency"
      target: "<= 105% of estimated time"
      measurement: "Actual vs estimated execution time"

# Simplified Contingency Plans
contingency_plans:
  - scenario: "insufficient_research_depth"
    trigger: "Research completeness gate failure"
    recovery_actions:
      - "Expand research scope to cover missing areas"
      - "Consult additional authoritative sources"
      - "Increase analysis depth for key findings"
      
  - scenario: "technical_analysis_gaps"
    trigger: "Technical analysis gate failure"
    recovery_actions:
      - "Deepen technical feasibility assessment"
      - "Expand integration consideration analysis"
      - "Consult technical subject matter experts"
      
  - scenario: "learning_consolidation_insufficient"
    trigger: "Learning consolidation gate failure"
    recovery_actions:
      - "Enhance pattern extraction methodology"
      - "Increase cross-agent insight integration"
      - "Improve knowledge synthesis approaches"
      
  - scenario: "consensus_synthesis_challenges"
    trigger: "Low consensus agreement score"
    recovery_actions:
      - "Re-evaluate evidence quality and weighting"
      - "Identify and resolve conflicting insights"
      - "Apply compromise synthesis strategies"