# Rapid Development Workflow Template
# Streamlined workflow for quick development tasks with essential quality validation

workflow_definition:
  name: "Rapid Development Workflow"
  description: "Streamlined workflow for rapid development with architecture guidance and quality validation"
  version: "1.0" 
  complexity_level: 4
  estimated_duration: "1.5-2.5 hours"
  execution_mode: "sequential"
  
workflow_metadata:
  created_by: "workflow-orchestrator"
  created_at: "2025-01-31"
  use_cases:
    - "Quick feature implementations"
    - "Bug fixes with architectural validation"
    - "Small to medium development tasks"
    - "Rapid prototyping with quality assurance"
    - "Time-sensitive development deliverables"
  
quality_standards:
  minimum_quality_score: 8.5
  required_testing_coverage: 85
  architecture_compliance: "required"
  performance_validation: "basic"

# Sequential Agent Execution Definition
agents:
  - agent_id: "architecture_guidance_phase"
    agent_type: "apex-architect"
    execution_order: 1
    estimated_duration: "20-30 minutes"
    description: "Quick architectural guidance and technical direction for rapid development"
    
    input_requirements:
      - "development_requirements"
      - "existing_system_context"
      - "technical_constraints"
      - "time_constraints"
      
    output_deliverables:
      - "technical_approach_guidance"
      - "architecture_compliance_requirements"
      - "implementation_patterns"
      - "quality_standards_definition"
      - "rapid_development_guidelines"
      
    quality_standards:
      - name: "Technical Guidance Quality"
        criteria: "Clear, actionable technical guidance for rapid development"
        minimum_score: 8.5
      - name: "Architecture Alignment"
        criteria: "Guidance aligns with existing system architecture"
        minimum_score: 9.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "rapid_development_phase"
      critical_outputs:
        - "implementation_approach"
        - "coding_standards"
        - "testing_requirements"
        - "performance_considerations"
        
  - agent_id: "rapid_development_phase"
    agent_type: "apex-developer"
    execution_order: 2
    estimated_duration: "60-90 minutes"
    description: "Rapid implementation following architectural guidance with quality focus"
    
    dependencies:
      - agent_id: "architecture_guidance_phase"
        required_outputs: ["technical_approach_guidance", "implementation_patterns"]
        
    input_requirements:
      - "technical_approach_guidance"
      - "implementation_patterns"
      - "rapid_development_guidelines"
      - "quality_standards_definition"
      
    output_deliverables:
      - "implemented_solution"
      - "unit_tests"
      - "basic_integration_tests"
      - "inline_documentation"
      - "deployment_notes"
      
    quality_standards:
      - name: "Implementation Quality"
        criteria: "Clean, functional code following architectural guidance"
        minimum_score: 8.5
      - name: "Testing Adequacy"
        criteria: "Adequate test coverage for rapid development context"
        minimum_score: 85
      - name: "Architecture Compliance"
        criteria: "Implementation follows architectural guidance"
        minimum_score: 9.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "quality_validation_phase"
      critical_outputs:
        - "implementation_artifacts"
        - "test_results"
        - "potential_issues"
        - "performance_notes"
        
  - agent_id: "quality_validation_phase"
    agent_type: "apex-qa-debugger"
    execution_order: 3
    estimated_duration: "30-45 minutes"
    description: "Focused quality validation and debugging for rapid development deliverables"
    
    dependencies:
      - agent_id: "rapid_development_phase"
        required_outputs: ["implemented_solution", "unit_tests", "basic_integration_tests"]
        
    input_requirements:
      - "implemented_solution"
      - "test_results"
      - "quality_standards_definition"
      - "rapid_validation_criteria"
      
    output_deliverables:
      - "quality_validation_report"
      - "test_execution_results"
      - "issue_identification"
      - "performance_assessment"
      - "deployment_readiness_status"
      
    quality_standards:
      - name: "Quality Validation Thoroughness"
        criteria: "Comprehensive validation within rapid development constraints"
        minimum_score: 8.5
      - name: "Issue Detection Effectiveness"
        criteria: "Effective identification of critical issues"
        minimum_score: 9.0
        
    context_handoff:
      memory_persistence: true
      context_bridge_to: "rapid_consensus_phase"
      critical_outputs:
        - "validation_summary"
        - "quality_confirmation"
        - "recommended_improvements"
        - "deployment_guidance"

# Rapid Consensus Building
consensus_building:
  agent_id: "rapid_consensus_phase"
  agent_type: "consensus-builder"
  execution_order: 4
  estimated_duration: "15-20 minutes"
  description: "Quick consensus building for rapid development deliverables"
  
  input_sources:
    - "architecture_guidance_phase"
    - "rapid_development_phase"
    - "quality_validation_phase"
    
  consensus_criteria:
    minimum_agent_agreement: 75
    evidence_quality_threshold: 8.0
    implementation_readiness_score: 8.5
    
  output_deliverables:
    - "rapid_delivery_assessment"
    - "deployment_recommendation"
    - "immediate_action_items"
    - "follow_up_tasks"
    - "success_validation_criteria"

# Streamlined Quality Gates
quality_gates:
  - gate_id: "architecture_guidance_gate"
    trigger_after: "architecture_guidance_phase"
    validation_criteria:
      - "Technical guidance completeness >= 85%"
      - "Architecture alignment score >= 9.0"
      - "Implementation clarity >= 8.5"
    failure_action: "clarify_technical_guidance"
    
  - gate_id: "rapid_development_gate"
    trigger_after: "rapid_development_phase"
    validation_criteria:
      - "Implementation quality score >= 8.5"
      - "Test coverage >= 85%"
      - "Architecture compliance >= 9.0"
    failure_action: "address_quality_gaps"
    
  - gate_id: "quality_validation_gate"
    trigger_after: "quality_validation_phase"
    validation_criteria:
      - "Quality validation score >= 8.5"
      - "Critical issues identified = 0"
      - "Deployment readiness = confirmed"
    failure_action: "resolve_critical_issues"

# Memory and Learning Integration
memory_integration:
  persistent_storage: true
  cross_session_learning: true
  pattern_recognition: true
  rapid_pattern_focus: true
  
  memory_points:
    - after_phase: "architecture_guidance_phase"
      store_patterns: ["rapid_guidance_techniques", "effective_constraint_handling", "quick_decision_frameworks"]
    - after_phase: "rapid_development_phase"
      store_patterns: ["rapid_implementation_strategies", "efficient_testing_approaches", "quick_quality_techniques"]
    - after_phase: "quality_validation_phase"
      store_patterns: ["rapid_validation_methods", "efficient_issue_detection", "quick_quality_assessment"]

# Performance Monitoring
performance_monitoring:
  track_execution_time: true
  measure_quality_scores: true
  monitor_rapid_delivery_effectiveness: true
  
  success_metrics:
    - name: "Rapid Delivery Success"
      target: ">= 90%"
      measurement: "Successful rapid delivery with quality standards met"
      
    - name: "Time Efficiency"
      target: "<= 100% of estimated time"
      measurement: "Actual vs estimated execution time for rapid workflow"
      
    - name: "Quality Maintenance"
      target: ">= 8.5/10 average quality"
      measurement: "Quality scores maintained despite rapid development"
      
    - name: "Architecture Compliance"
      target: "100%"
      measurement: "Full compliance with architectural guidance"

# Rapid Recovery Plans
contingency_plans:
  - scenario: "architecture_guidance_insufficient"
    trigger: "Architecture guidance gate failure"
    recovery_actions:
      - "Clarify technical requirements and constraints"
      - "Simplify approach for rapid implementation"
      - "Focus on essential architectural compliance"
      
  - scenario: "rapid_development_quality_issues"
    trigger: "Rapid development gate failure"
    recovery_actions:
      - "Address critical quality gaps quickly"
      - "Focus testing on essential functionality"
      - "Ensure minimum viable architecture compliance"
      
  - scenario: "quality_validation_failures"
    trigger: "Quality validation gate failure"
    recovery_actions:
      - "Resolve critical issues immediately"
      - "Implement quick fixes for deployment blockers"
      - "Defer non-critical improvements to follow-up"
      
  - scenario: "rapid_consensus_challenges"
    trigger: "Low consensus score in rapid timeframe"
    recovery_actions:
      - "Focus on essential deliverable requirements"
      - "Prioritize deployment readiness over perfection"
      - "Document deferred improvements for follow-up"